<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>每週 YouTube 連結</title>
  <style>
    :root{--bg:#f6f7f9;--card:#fff;--text:#111827;--muted:#6b7280;--primary:#111827;--radius:16px}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:linear-gradient(#ffffff,#f7f8fa);color:var(--text)}
    .container{max-width:1040px;margin:0 auto;padding:16px}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(1.2) blur(8px);background:rgba(255,255,255,.85);border-bottom:1px solid #e5e7eb}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px}
    .logo{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:12px;background:var(--primary);color:#fff}
    .row{display:flex;gap:12px;align-items:center}
    .spacer{flex:1}
    button,.btn{appearance:none;border:1px solid #e5e7eb;background:#fff;border-radius:12px;padding:10px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
    button.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    button:disabled{opacity:.6;cursor:not-allowed}
    select,input,textarea{width:100%;border:1px solid #e5e7eb;border-radius:12px;padding:10px 12px;font:inherit}
    label{font-size:12px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(1,minmax(0,1fr));gap:16px}
    @media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:880px){.grid{grid-template-columns:repeat(3,1fr)}}
    .card{background:var(--card);border:1px solid #e5e7eb;border-radius:var(--radius);overflow:hidden}
    .card .thumb{position:relative;aspect-ratio:16/9;background:#f3f4f6}
    .card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .badge{position:absolute;top:8px;left:8px;font-size:12px;font-weight:600;background:rgba(255,255,255,.9);padding:4px 8px;border-radius:999px}
    .p{padding:12px}
    .muted{color:var(--muted)}
    .section{margin:18px 0}
    .danger{color:#b91c1c}
    .hidden{display:none !important}
    footer{color:#6b7280;font-size:12px;text-align:center;padding:36px 0}
    .admin-panel{background:#fff;border:1px dashed #cbd5e1;border-radius:16px;padding:16px}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{border-bottom:1px solid #e5e7eb;padding:8px 6px;text-align:left;font-size:14px}
    .nowrap{white-space:nowrap}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    /* 年份與日期選擇器樣式 */
    .year-tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; overflow-x: auto; }
    .year-tab { padding: 6px 16px; border-radius: 20px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 16px; transition: all 0.2s; }
    .year-tab:hover { color: var(--primary); background: #f3f4f6; }
    .year-tab.active { background: var(--primary); color: #fff; }
    .month-row { display: flex; align-items: flex-start; gap: 16px; padding: 12px 0; border-bottom: 1px dashed #e5e7eb; }
    .month-row:last-child { border-bottom: none; }
    .month-label { font-weight: 700; color: var(--muted); width: 45px; flex-shrink: 0; padding-top: 6px; }
    .date-pills { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
    .date-pill { padding: 6px 12px; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-size: 14px; transition: all 0.2s; color: var(--text); }
    .date-pill:hover { border-color: #cbd5e1; background: #f8fafc; }
    .date-pill.active { background: #e5e7eb; border-color: #d1d5db; font-weight: 700; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
    /* Loading overlay */
    #loadingMsg { text-align: center; padding: 40px; font-size: 18px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="container row" style="padding:10px 16px">
      <div class="brand"><span class="logo">YT</span><span>每週 YouTube 連結</span></div>
      <div class="spacer"></div>
      <button id="adminBtn" title="登入編輯模式">編輯</button>
      <button id="logoutBtn" class="hidden" title="離開編輯模式">退出編輯</button>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="card p" style="margin-bottom: 16px;">
        <div id="yearTabs" class="year-tabs"></div>
        <div id="monthList"></div>
      </div>
      
      <div class="row" style="justify-content: flex-end; gap: 16px; flex-wrap: wrap">
        <select id="weekSelect" class="hidden"></select>
        <button id="shareBtn" class="btn">複製此週分享連結</button>
        <button id="openAllBtn" class="primary">開啟全部</button>
      </div>
    </section>

    <section id="weekHeader" class="section hidden">
      <h1 id="weekTitle" style="margin:0 0 6px;font-size:24px"></h1>
      <div class="muted" id="weekDate"></div>
    </section>

    <div id="loadingMsg">資料載入中，請稍候...</div>
    <section id="cards" class="grid"></section>

    <section id="adminPanel" class="section admin-panel hidden">
      <h2 style="margin:0 0 12px">編輯模式（資料將同步至 Google Sheet）</h2>
      <details open>
        <summary style="cursor:pointer; font-weight:bold;">新增 / 更新一週</summary>
        <div class="row" style="margin-top:12px;gap:12px;align-items:flex-start;flex-wrap:wrap">
          <div style="flex:1;min-width:220px">
            <label>日期（週一，YYYY-MM-DD）</label>
            <input id="inpDate" type="date" />
          </div>
          <div style="flex:2;min-width:260px">
            <label>標題（可選）</label>
            <input id="inpTitle" type="text" placeholder="例如：65Volleyball" />
          </div>
        </div>
        <div class="section">
          <label>YouTube 連結（每行一個）</label>
          <textarea id="inpUrls" rows="8" class="mono" placeholder="https://www.youtube.com/watch?v=...\nhttps://youtu.be/...\n"></textarea>
        </div>
        <div class="row">
          <button id="saveWeekBtn" class="primary">上傳並儲存至 Google Sheet</button>
          <button id="clearFormBtn">清空表單</button>
        </div>
      </details>

      <div class="section">
        <h3 style="margin:0 0 8px">目前週次管理</h3>
        <table class="table" id="weeksTable">
          <thead><tr><th>日期</th><th>標題</th><th class="nowrap">連結數</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">© <span id="year"></span> 每週 YouTube 連結</div>
  </footer>

  <script>
    // ===================== API 設定區 =====================
    const ADMIN_PASS = "0214"; 
    // 👇👇👇 請將下面這行換成你剛才從 Google Apps Script 複製的網址 👇👇👇
    const API_URL = "https://script.google.com/macros/s/AKfycbwbdjoDotsg2r9bgSapMtXlpSuR8XHD-b_ZOoh5LCLQwBN6W-1pdngDyCqyqM9GkzrRnQ/exec"; 
    // =====================================================

    const $ = (s, r=document) => r.querySelector(s);
    const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
    const qs = new URLSearchParams(location.search);
    const fmtDate = (iso) => new Date(iso+"T00:00:00").toLocaleDateString(undefined,{year:'numeric',month:'2-digit',day:'2-digit'});
    function getYouTubeId(url){
      try{
        const u = new URL(url);
        if(u.hostname.includes('youtu.be')) return u.pathname.replace('/','');
        if(u.hostname.includes('youtube.com')){
          if(u.searchParams.get('v')) return u.searchParams.get('v');
          const m = u.pathname.match(/\/shorts\/([\w-]+)/);
          if(m) return m[1];
        }
      }catch{}
      return null;
    }

    // ==== 狀態 ====
    let weeks = []; 
    let currentYear = ''; 
    let authed = false;
    let sessionPassword = "";

    // ==== 載入雲端資料 ====
    async function fetchSheetData() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        
        // 🛠️ 新增這段：強制將 Google 傳來的長字串格式轉回 YYYY-MM-DD
        weeks = data.map(w => {
          const d = new Date(w.date);
          if (!isNaN(d.getTime())) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            w.date = `${y}-${m}-${day}`;
          }
          return w;
        });
        
        // 🛠️ 新增這段：修復日期後，確保資料是由新到舊往下排
        weeks.sort((a, b) => b.date.localeCompare(a.date));

        $('#loadingMsg').style.display = 'none';
        $('#weekHeader').classList.remove('hidden');
        renderSelect();
        if(authed) renderWeeksTable();
      } catch (err) {
        $('#loadingMsg').innerHTML = '<span class="danger">無法載入資料，請確認 API_URL 是否正確。</span>';
        console.error(err);
      }
    }

    // ==== 渲染 ====
    const weekSelect = $('#weekSelect');
    const cards = $('#cards');
    const weekTitle = $('#weekTitle');
    const weekDate = $('#weekDate');

    function renderSelect() {
      if(weeks.length === 0) return;
      weekSelect.innerHTML = weeks.map(w => `<option value="${w.date}">${w.date}</option>`).join('');
      const want = qs.get('date');
      weekSelect.value = weeks.find(w => w.date === want)?.date || weeks[0]?.date || '';
      currentYear = weekSelect.value ? weekSelect.value.substring(0, 4) : weeks[0]?.date.substring(0, 4);
      renderCustomPicker();
      renderWeek();
    }

    function renderCustomPicker() {
      const grouped = {};
      weeks.forEach(w => {
        const year = w.date.substring(0, 4);
        const month = parseInt(w.date.substring(5, 7), 10) + "月";
        if (!grouped[year]) grouped[year] = {};
        if (!grouped[year][month]) grouped[year][month] = [];
        grouped[year][month].push(w);
      });

      const years = Object.keys(grouped).sort((a, b) => b - a);
      $('#yearTabs').innerHTML = years.map(y => `<button class="year-tab ${y === currentYear ? 'active' : ''}" data-year="${y}">${y}年</button>`).join('');
      
      $$('.year-tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
          currentYear = e.target.getAttribute('data-year');
          renderCustomPicker(); 
        });
      });

      const yearData = grouped[currentYear] || {};
      const months = Object.keys(yearData).sort((a, b) => parseInt(b) - parseInt(a)); 
      let html = '';
      months.forEach(m => {
        html += `<div class="month-row">
            <div class="month-label">${m}</div>
            <div class="date-pills">
              ${yearData[m].map(w => {
                const isSelected = w.date === weekSelect.value;
                const shortDate = w.date.substring(5); 
                return `<button class="date-pill ${isSelected ? 'active' : ''}" data-date="${w.date}">${shortDate}</button>`;
              }).join('')}
            </div>
          </div>`;
      });
      $('#monthList').innerHTML = html || '<div class="muted">該年無資料</div>';

      $$('.date-pill').forEach(btn => {
        btn.addEventListener('click', (e) => {
          weekSelect.value = e.target.getAttribute('data-date');
          weekSelect.dispatchEvent(new Event('change')); 
          $$('.date-pill').forEach(p => p.classList.remove('active'));
          e.target.classList.add('active');
        });
      });
    }

    function renderWeek(){
      const w = weeks.find(x=>x.date===weekSelect.value);
      if(!w){ cards.innerHTML = '<div class="muted">尚無資料</div>'; return; }
      weekTitle.textContent = w.title || '每週清單';
      weekDate.textContent = '週期：' + fmtDate(w.date);
      cards.innerHTML = w.urls.map((u,i)=>{
        const id = getYouTubeId(u);
        const thumb = id? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
        const label = id? `https://youtu.be/${id}` : u;
        return `<a class="card" href="${u}" target="_blank" rel="noreferrer">
            <div class="thumb">${thumb?`<img src="${thumb}" alt="">`:''}<span class="badge">#${i+1}</span></div>
            <div class="p row" style="justify-content:space-between">
              <div class="muted" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%">${label}</div>
              <span aria-hidden>↗</span>
            </div>
          </a>`;
      }).join('');
    }

    // ==== 使用者動作（共用）====
    weekSelect.addEventListener('change',()=>{
      renderWeek();
      const url = new URL(location.href);
      url.searchParams.set('date', weekSelect.value);
      history.replaceState(null,'',url);
    });

    $('#openAllBtn').addEventListener('click',()=>{
      const w = weeks.find(x=>x.date===weekSelect.value);
      if(!w) return;
      w.urls.forEach((u,i)=>setTimeout(()=>window.open(u,'_blank'), i*130));
    });

    $('#shareBtn').addEventListener('click', async ()=>{
      const url = new URL(location.href);
      url.searchParams.set('date', weekSelect.value);
      await navigator.clipboard.writeText(url.toString());
      const btn = $('#shareBtn');
      const old = btn.textContent; btn.textContent = '已複製';
      setTimeout(()=>btn.textContent = old, 1200);
    });

    // ==== Admin / Provider ====
    const adminBtn = $('#adminBtn');
    const logoutBtn = $('#logoutBtn');
    const adminPanel = $('#adminPanel');

    function setAdminUI(on){
      adminPanel.classList.toggle('hidden', !on);
      adminBtn.classList.toggle('hidden', on);
      logoutBtn.classList.toggle('hidden', !on);
    }

    adminBtn.addEventListener('click', ()=>{
      const p = prompt('請輸入編輯密碼：');
      if(p === ADMIN_PASS){
        sessionPassword = p;
        authed = true; 
        setAdminUI(true); 
        renderWeeksTable(); 
        preloadFormFromSelected();
      }else if(p !== null){
        alert('密碼錯誤！');
      }
    });

    logoutBtn.addEventListener('click', ()=>{ 
      authed=false; 
      sessionPassword="";
      setAdminUI(false); 
    });

    function renderWeeksTable(){
      const tbody = $('#weeksTable tbody');
      tbody.innerHTML = weeks.map(w=>{
        const count = w.urls.length;
        return `<tr>
          <td class="mono">${w.date}</td>
          <td>${w.title||''}</td>
          <td class="nowrap">${count}</td>
          <td class="nowrap">
            <button data-act="edit" data-date="${w.date}">編輯</button>
            <button data-act="del" data-date="${w.date}" class="danger">刪除</button>
          </td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click', async (e)=>{
          const date = e.currentTarget.getAttribute('data-date');
          const act = e.currentTarget.getAttribute('data-act');
          const w = weeks.find(x=>x.date===date);
          
          if(act==='edit' && w){ 
            fillForm(w); 
            window.scrollTo({top:0,behavior:'smooth'}); 
          }
          
          if(act==='del'){
            if(confirm(`確定要從 Google Sheet 刪除 ${date} 的資料嗎？`)){
              e.currentTarget.textContent = '刪除中...';
              e.currentTarget.disabled = true;
              await apiCall({ action: 'delete', date: date, password: sessionPassword });
            }
          }
        });
      });
    }

    const inpDate = $('#inpDate');
    const inpTitle = $('#inpTitle');
    const inpUrls = $('#inpUrls');
    $('#clearFormBtn').addEventListener('click', ()=>{ inpDate.value=''; inpTitle.value=''; inpUrls.value=''; });

    function fillForm(w){ inpDate.value=w.date; inpTitle.value=w.title||''; inpUrls.value=(w.urls||[]).join('\n'); }
    function preloadFormFromSelected(){
      const w = weeks.find(x=>x.date===weekSelect.value);
      if(w) fillForm(w);
    }

    // 與 Google Sheet 溝通的底層函式
    async function apiCall(payload) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 使用 text/plain 避開 CORS 問題
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.success) {
          alert(result.message);
          $('#loadingMsg').style.display = 'block';
          $('#loadingMsg').textContent = '重新整理資料中...';
          await fetchSheetData(); // 成功後重新抓一次資料更新畫面
        } else {
          alert('操作失敗：' + result.message);
        }
      } catch (err) {
        alert('網路錯誤，請稍後再試。');
        console.error(err);
      }
    }

    // 儲存按鈕
    $('#saveWeekBtn').addEventListener('click', async ()=>{
      if(!authed) return alert('請先登入');
      const date = inpDate.value.trim();
      if(!date) return alert('請輸入日期');
      const urls = inpUrls.value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
      if(urls.length===0) return alert('請至少輸入一個連結');
      const title = inpTitle.value.trim();

      const btn = $('#saveWeekBtn');
      btn.textContent = '上傳中...';
      btn.disabled = true;

      await apiCall({
        action: 'save',
        password: sessionPassword,
        date: date,
        title: title,
        urls: urls
      });

      btn.textContent = '上傳並儲存至 Google Sheet';
      btn.disabled = false;
      weekSelect.value = date; 
      weekSelect.dispatchEvent(new Event('change'));
    });

    // 初始載入
    $('#year').textContent = new Date().getFullYear();
    fetchSheetData(); // 一進網頁就去 Google Sheet 抓資料
  </script>
</body>
</html>
