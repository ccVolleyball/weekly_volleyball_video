<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店家資料管理系統</title>
    <style>
        /* (前面的 CSS 保持不變，新增了按鈕顏色) */
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f9f9f9; color: #333; }
        h2 { border-bottom: 2px solid #ccc; padding-bottom: 5px; }
        .section { background-color: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { display: inline-block; margin-right: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"] { padding: 8px; width: 150px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: #fff; font-weight: bold; margin-right: 5px; }
        
        .btn-add { background-color: #28a745; } .btn-add:hover { background-color: #218838; }
        .btn-map { background-color: #4285F4; } .btn-map:hover { background-color: #357AE8; }
        .btn-filter { background-color: #17a2b8; } .btn-filter:hover { background-color: #138496; }
        
        /* 新增的按鈕樣式 */
        .btn-edit { background-color: #ffc107; color: #333; padding: 5px 10px; font-size: 13px;} 
        .btn-edit:hover { background-color: #e0a800; }
        .btn-delete { background-color: #dc3545; padding: 5px 10px; font-size: 13px;} 
        .btn-delete:hover { background-color: #c82333; }
        .btn-cancel { background-color: #6c757d; display: none; } 
        .btn-cancel:hover { background-color: #5a6268; }

        .keyword-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background-color: #e2e3e5; padding: 5px 10px; border-radius: 15px; font-size: 13px; display: flex; align-items: center; }
        .tag span { margin-left: 8px; cursor: pointer; color: #dc3545; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; cursor: pointer; position: relative; }
        th:hover { background-color: #e9e9e9; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f1f1f1; }
        a.map-link { color: #4285F4; text-decoration: none; font-weight: bold; }
        a.map-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="section">
        <h2 id="formTitle">新增資料</h2>
        <div class="form-group">
            <label>縣市</label>
            <input type="text" id="city" placeholder="例如：新北市">
        </div>
        <div class="form-group">
            <label>區域</label>
            <input type="text" id="district" placeholder="例如：板橋區">
        </div>
        <div class="form-group">
            <label>地址</label>
            <input type="text" id="address" placeholder="例如：中山路一段1號" style="width: 250px;">
        </div>
        <div class="form-group">
            <label>店名</label>
            <input type="text" id="storeName" placeholder="例如：美味小吃">
        </div>
        <div class="form-group">
            <label>分類</label>
            <input type="text" id="category" placeholder="例如：餐廳">
        </div>
        <div class="form-group">
            <label>其他</label>
            <input type="text" id="other" placeholder="備註...">
        </div>
        <div style="margin-top: 10px;">
            <button id="submitBtn" class="btn-add" onclick="submitData()">新增資料</button>
            <button id="cancelBtn" class="btn-cancel" onclick="cancelEdit()">取消編輯</button>
            <button class="btn-map" onclick="testGoogleMap()">測試 Google Map</button>
        </div>
    </div>

    <div class="section">
        <h2>顯示與過濾資料</h2>
        <div>
            <input type="text" id="filterInput" placeholder="輸入關鍵字..." onkeypress="handleFilterKeyPress(event)">
            <button class="btn-filter" onclick="addFilterKeyword()">新增過濾條件</button>
            <span style="font-size: 13px; color: #666; margin-left: 10px;">(包含任意關鍵字即顯示)</span>
            <div class="keyword-tags" id="keywordContainer"></div>
        </div>

        <table id="dataTable">
            <thead>
                <tr>
                    <th onclick="sortTable('city')">縣市</th>
                    <th onclick="sortTable('district')">區域</th>
                    <th onclick="sortTable('address')">地址</th>
                    <th onclick="sortTable('storeName')">店名</th>
                    <th onclick="sortTable('category')">分類</th>
                    <th onclick="sortTable('other')">其他</th>
                    <th>Google Map</th>
                    <th>操作</th> </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let filterKeywords = [];
        let sortCol = '';
        let sortAsc = true;
        let dataList = []; 
        let editingId = null; // 紀錄目前正在編輯的資料 ID

        // 💡 請換成您正確的亂碼 API_URL
        const API_URL = "https://script.google.com/macros/s/AKfycbworoIMCfLuYQ3UseLC0YNbzrWtT9IFmTXbEOcU1O5-U3PyUbpmt1m71jjgkB4Gp9Uk/exec";
        

        window.onload = async function() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                dataList = data.map(item => ({
                    ...item,
                    fullText: `${item.city} ${item.district} ${item.address} ${item.storeName} ${item.category} ${item.other}`.toLowerCase()
                }));
                renderTable();
            } catch (error) {
                console.error("載入資料失敗:", error);
            }
        };

        function getMapUrl(city, district, address, storeName) {
            const query = `${city}${district}${address} ${storeName}`;
            return `https://www.google.com/maps/search/?api=1&query=$${encodeURIComponent(query)}`; // 已修復 $ 符號
        }

        function testGoogleMap() {
            const city = document.getElementById('city').value;
            const district = document.getElementById('district').value;
            const address = document.getElementById('address').value;
            const storeName = document.getElementById('storeName').value;
            if (!city && !address && !storeName) { alert('請至少填寫縣市、地址或店名'); return; }
            window.open(getMapUrl(city, district, address, storeName), '_blank');
        }

        // 新增與更新資料合併為 submitData
        async function submitData() {
            const city = document.getElementById('city').value.trim();
            const district = document.getElementById('district').value.trim();
            const address = document.getElementById('address').value.trim();
            const storeName = document.getElementById('storeName').value.trim();
            const category = document.getElementById('category').value.trim();
            const other = document.getElementById('other').value.trim();

            if (!storeName) { alert('店名為必填欄位！'); return; }

            const payload = {
                id: editingId ? editingId : Date.now(), // 如果在編輯狀態，沿用舊 ID；否則產生新 ID
                action: editingId ? 'edit' : 'add',     // 判斷動作
                city, district, address, storeName, category, other
            };

            const fullText = `${city} ${district} ${address} ${storeName} ${category} ${other}`.toLowerCase();

            // 1. 畫面先更新 (Optimistic UI)
            if (editingId) {
                const index = dataList.findIndex(d => d.id === editingId);
                if (index > -1) dataList[index] = { ...payload, fullText };
            } else {
                dataList.push({ ...payload, fullText });
            }
            renderTable();
            cancelEdit(); // 清空欄位並恢復為「新增」狀態

            // 2. 背景傳送至 Google Sheet
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                console.error("儲存失敗:", error);
                alert("資料更新至雲端時發生錯誤！");
            }
        }

        // 點擊表格的「編輯」按鈕
        function editData(id) {
            const item = dataList.find(d => d.id === id);
            if (!item) return;

            // 將資料填回輸入框
            document.getElementById('city').value = item.city || '';
            document.getElementById('district').value = item.district || '';
            document.getElementById('address').value = item.address || '';
            document.getElementById('storeName').value = item.storeName || '';
            document.getElementById('category').value = item.category || '';
            document.getElementById('other').value = item.other || '';

            // 改變 UI 狀態
            editingId = id;
            document.getElementById('formTitle').innerText = '編輯資料';
            document.getElementById('submitBtn').innerText = '儲存修改';
            document.getElementById('submitBtn').className = 'btn-edit';
            document.getElementById('cancelBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 畫面滾回最上方
        }

        // 取消編輯狀態
        function cancelEdit() {
            editingId = null;
            document.querySelectorAll('.section:first-child input').forEach(input => input.value = '');
            document.getElementById('formTitle').innerText = '新增資料';
            document.getElementById('submitBtn').innerText = '新增資料';
            document.getElementById('submitBtn').className = 'btn-add';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // 點擊表格的「刪除」按鈕
        async function deleteData(id) {
            if (!confirm('確定要刪除這筆資料嗎？')) return;

            // 1. 畫面先移除
            dataList = dataList.filter(d => d.id !== id);
            renderTable();

            // 2. 通知後端刪除
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id: id, action: 'delete' })
                });
            } catch (error) {
                console.error("刪除失敗:", error);
                alert("雲端刪除失敗，請重新整理頁面！");
            }
        }

        // --- 以下過濾與排序功能維持不變 ---
        function addFilterKeyword() {
            const input = document.getElementById('filterInput');
            const keyword = input.value.trim().toLowerCase();
            if (keyword && !filterKeywords.includes(keyword)) {
                filterKeywords.push(keyword); renderKeywords(); renderTable();
            }
            input.value = '';
        }

        function handleFilterKeyPress(event) { if (event.key === 'Enter') addFilterKeyword(); }
        function removeKeyword(keyword) { filterKeywords = filterKeywords.filter(k => k !== keyword); renderKeywords(); renderTable(); }
        
        function renderKeywords() {
            const container = document.getElementById('keywordContainer'); container.innerHTML = '';
            filterKeywords.forEach(keyword => {
                const tag = document.createElement('div'); tag.className = 'tag';
                tag.innerHTML = `${keyword} <span onclick="removeKeyword('${keyword}')">✖</span>`;
                container.appendChild(tag);
            });
        }

        function sortTable(column) {
            if (sortCol === column) sortAsc = !sortAsc; else { sortCol = column; sortAsc = true; }
            dataList.sort((a, b) => {
                let valA = a[column] || ''; let valB = b[column] || '';
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
            dataList.forEach(data => {
                let showRow = true;
                if (filterKeywords.length > 0) showRow = filterKeywords.some(keyword => data.fullText.includes(keyword));
                if (showRow) {
                    const tr = document.createElement('tr');
                    const mapUrl = getMapUrl(data.city, data.district, data.address, data.storeName);
                    tr.innerHTML = `
                        <td>${data.city}</td>
                        <td>${data.district}</td>
                        <td>${data.address}</td>
                        <td>${data.storeName}</td>
                        <td>${data.category}</td>
                        <td>${data.other}</td>
                        <td><a href="${mapUrl}" target="_blank" class="map-link">地圖搜尋</a></td>
                        <td>
                            <button class="btn-edit" onclick="editData(${data.id})">編輯</button>
                            <button class="btn-delete" onclick="deleteData(${data.id})">刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        }
    </script>
</body>
</html>
