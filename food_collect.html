<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資料管理系統</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f9f9f9; color: #333; }
        h2 { border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-top: 0; }
        .section { background-color: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { display: inline-block; margin-right: 15px; margin-bottom: 15px; vertical-align: top; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input[type="text"], input[type="date"], select, textarea { padding: 8px; width: 160px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; box-sizing: border-box; }
        textarea { resize: both; } 
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: #fff; font-weight: bold; margin-right: 5px; margin-bottom: 5px; }
        
        .btn-add { background-color: #28a745; } .btn-add:hover { background-color: #218838; }
        .btn-map { background-color: #4285F4; } .btn-map:hover { background-color: #357AE8; }
        .btn-filter { background-color: #17a2b8; } .btn-filter:hover { background-color: #138496; }
        
        .btn-edit { background-color: #ffc107; color: #333; padding: 5px 10px; font-size: 13px;} .btn-edit:hover { background-color: #e0a800; }
        .btn-copy { background-color: #17a2b8; color: #fff; padding: 5px 10px; font-size: 13px;} .btn-copy:hover { background-color: #138496; }
        .btn-delete { background-color: #dc3545; padding: 5px 10px; font-size: 13px;} .btn-delete:hover { background-color: #c82333; }
        .btn-cancel { background-color: #6c757d; display: none; } .btn-cancel:hover { background-color: #5a6268; }

        .keyword-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background-color: #e2e3e5; padding: 5px 10px; border-radius: 15px; font-size: 13px; display: flex; align-items: center; }
        .tag span { margin-left: 8px; cursor: pointer; color: #dc3545; font-weight: bold; }

        /* 隱藏欄位選單區塊 CSS */
        .col-toggle-box { background: #f1f8ff; border: 1px solid #cce5ff; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 14px; }
        .col-toggle-box label { display: inline-block; margin-right: 12px; font-weight: normal; cursor: pointer; color: #333; margin-bottom: 0; }
        .col-toggle-box input[type="checkbox"] { margin-right: 4px; cursor: pointer; }

        /* 動態隱藏欄位的 CSS 規則 */
        .hide-col-1 th:nth-child(1), .hide-col-1 td:nth-child(1) { display: none !important; }
        .hide-col-2 th:nth-child(2), .hide-col-2 td:nth-child(2) { display: none !important; }
        .hide-col-3 th:nth-child(3), .hide-col-3 td:nth-child(3) { display: none !important; }
        .hide-col-4 th:nth-child(4), .hide-col-4 td:nth-child(4) { display: none !important; }
        .hide-col-5 th:nth-child(5), .hide-col-5 td:nth-child(5) { display: none !important; }
        .hide-col-6 th:nth-child(6), .hide-col-6 td:nth-child(6) { display: none !important; }
        .hide-col-7 th:nth-child(7), .hide-col-7 td:nth-child(7) { display: none !important; }
        .hide-col-8 th:nth-child(8), .hide-col-8 td:nth-child(8) { display: none !important; }
        .hide-col-9 th:nth-child(9), .hide-col-9 td:nth-child(9) { display: none !important; }
        .hide-col-10 th:nth-child(10), .hide-col-10 td:nth-child(10) { display: none !important; }
        .hide-col-11 th:nth-child(11), .hide-col-11 td:nth-child(11) { display: none !important; }

        .table-responsive { overflow-x: auto; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 0; text-align: left; vertical-align: top;} 
        th { background-color: #f2f2f2; position: relative; padding: 10px; cursor: pointer; }
        th:hover { background-color: #e9e9e9; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f1f1f1; }
        a.map-link { color: #4285F4; text-decoration: none; font-weight: bold; }

        .resizable-cell { resize: both; overflow: auto; padding: 10px; min-width: 60px; min-height: 25px; max-width: 800px; max-height: 500px; box-sizing: border-box; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px; padding: 15px; background-color: #e9ecef; border-radius: 8px; display: flex; align-items: center; flex-wrap: wrap; gap: 10px;">
        <label for="pageSelector" style="font-size: 16px; margin-bottom: 0;">切換系統頁面：</label>
        <select id="pageSelector" onchange="switchPage()" style="padding: 8px; font-size: 16px; width: auto;">
            <option value="foodPage">🍔 美食店家地圖</option>
            <option value="sportsPage">🏃‍♂️ 運動訓練紀錄</option>
            <option value="notePage">📝 隨身筆記 (擴充1)</option>
            <script>
                for(let i=2; i<=10; i++){ document.write(`<option value="extPage${i}">📄 擴充預留網頁${i}</option>`); }
            </script>
        </select>
        <span id="loadingMsg" style="color: #007bff; font-weight: bold; display: none;">資料載入與同步中...</span>
    </div>

    <div class="section" style="background-color: #f0f7ff; border-left: 5px solid #007bff; padding: 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h3 style="margin: 0; color: #0056b3;">📖 頁面說明 / 欄位定義</h3>
            <div style="margin-top: 5px;">
                <button class="btn-edit" id="editDescBtn" onclick="enableDescEdit()">編輯說明</button>
                <button class="btn-add" id="saveDescBtn" style="display:none;" onclick="saveDescription()">儲存</button>
                <button class="btn-cancel" id="cancelDescBtn" style="display:none;" onclick="cancelDescEdit()">取消</button>
                <button class="btn-delete" id="deleteDescBtn" style="display:none;" onclick="deleteDescription()">清除</button>
            </div>
        </div>
        <div id="descDisplay" style="margin-top: 10px; white-space: pre-wrap; font-size: 15px; color: #444; min-height: 20px;"></div>
        <textarea id="descInput" style="display:none; width: 100%; margin-top: 10px; box-sizing: border-box;" rows="4" placeholder="請輸入這個頁面的說明，或是記錄這10個欄位分別代表什麼意思..."></textarea>
    </div>

    <div id="foodPage" class="app-page">
        <div class="section">
            <h2 id="foodFormTitle">新增美食店家</h2>
            <div class="form-group"><label>縣市</label><input type="text" id="city"></div>
            <div class="form-group"><label>區域</label><input type="text" id="district"></div>
            <div class="form-group"><label>地址</label><textarea id="address" rows="2"></textarea></div>
            <div class="form-group"><label>店名</label><input type="text" id="storeName"></div>
            <div class="form-group"><label>分類</label><input type="text" id="category"></div>
            <div class="form-group"><label>其他</label><textarea id="other" rows="2"></textarea></div>
            <div style="margin-top: 10px;">
                <button id="submitFoodBtn" class="btn-add" onclick="submitFoodData()">新增資料</button>
                <button id="cancelFoodBtn" class="btn-cancel" onclick="cancelFoodEdit()">取消編輯</button>
            </div>
        </div>
        <div class="section">
            <h2>美食清單與過濾</h2>
            <div style="margin-bottom: 15px;">
                <input type="text" id="filterInput" placeholder="輸入關鍵字..." onkeypress="if(event.key === 'Enter') addFilterKeyword()">
                <button class="btn-filter" onclick="addFilterKeyword()">新增過濾條件</button>
                <div class="keyword-tags" id="keywordContainer"></div>
            </div>

            <div class="col-toggle-box">
                <span style="font-weight:bold; color:#0056b3;">👁️ 顯示欄位：</span>
                <label><input type="checkbox" checked onchange="toggleCol('dataTable', 1, this)">縣市</label>
                <label><input type="checkbox" checked onchange="toggleCol('dataTable', 2, this)">區域</label>
                <label><input type="checkbox" checked onchange="toggleCol('dataTable', 3, this)">地址</label>
                <label><input type="checkbox" checked onchange="toggleCol('dataTable', 4, this)">店名</label>
                <label><input type="checkbox" checked onchange="toggleCol('dataTable', 5, this)">分類</label>
                <label><input type="checkbox" checked onchange="toggleCol('dataTable', 6, this)">其他</label>
                <label><input type="checkbox" checked onchange="toggleCol('dataTable', 7, this)">地圖</label>
            </div>

            <div class="table-responsive">
                <table id="dataTable">
                    <thead><tr><th onclick="sortTable('city')">縣市 ↕</th><th onclick="sortTable('district')">區域 ↕</th><th onclick="sortTable('address')">地址 ↕</th><th onclick="sortTable('storeName')">店名 ↕</th><th onclick="sortTable('category')">分類 ↕</th><th onclick="sortTable('other')">其他 ↕</th><th>地圖</th><th>操作</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="sportsPage" class="app-page" style="display: none;">
        <div class="section">
            <h2 id="sportsFormTitle">新增運動紀錄</h2>
            <div class="form-group"><label>日期</label><input type="date" id="sportDate"></div>
            <div class="form-group"><label>運動類型</label><select id="sportType"><option value="跑步">跑步</option><option value="排球">排球</option><option value="其他">其他</option></select></div>
            <div class="form-group"><label>距離 (km)</label><input type="text" id="sportDistance"></div>
            <div class="form-group"><label>備註 / 心得</label><textarea id="sportNotes" rows="2" style="width: 250px;"></textarea></div>
            <div style="margin-top: 10px;">
                <button id="submitSportsBtn" class="btn-add" onclick="submitSportsData()">新增紀錄</button>
                <button id="cancelSportsBtn" class="btn-cancel" onclick="cancelSportsEdit()">取消編輯</button>
            </div>
        </div>
        <div class="section">
            <h2>訓練紀錄總覽</h2>
            
            <div class="col-toggle-box">
                <span style="font-weight:bold; color:#0056b3;">👁️ 顯示欄位：</span>
                <label><input type="checkbox" checked onchange="toggleCol('sportsTable', 1, this)">日期</label>
                <label><input type="checkbox" checked onchange="toggleCol('sportsTable', 2, this)">運動類型</label>
                <label><input type="checkbox" checked onchange="toggleCol('sportsTable', 3, this)">距離 (km)</label>
                <label><input type="checkbox" checked onchange="toggleCol('sportsTable', 4, this)">備註</label>
            </div>

            <div class="table-responsive">
                <table id="sportsTable">
                    <thead><tr><th>日期</th><th>運動類型</th><th>距離 (km)</th><th>備註</th><th>操作</th></tr></thead>
                    <tbody id="sportsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="notePage" class="app-page" style="display: none;">
        <div class="section">
            <h2 id="noteFormTitle">新增筆記 / 事件</h2>
            <div class="form-group"><label>流水號 (col1)</label><input type="text" id="noteCol1" placeholder="例如：001"></div>
            <div class="form-group"><label>日期 (col2)</label><input type="date" id="noteCol2"></div>
            <div class="form-group"><label>分類 (col3)</label><input type="text" id="noteCol3"></div>
            <div class="form-group"><label>內容 (col4)</label><textarea id="noteCol4" rows="3" style="width: 250px;"></textarea></div>
            <script>
                for(let i=5; i<=10; i++) document.write(`<div class="form-group"><label>保留欄位 ${i}</label><textarea id="noteCol${i}" rows="2"></textarea></div>`);
            </script>
            <div style="margin-top: 10px;">
                <button id="submitNoteBtn" class="btn-add" onclick="submitNoteData()">儲存筆記</button>
                <button id="cancelNoteBtn" class="btn-cancel" onclick="cancelNoteEdit()">取消編輯</button>
            </div>
        </div>
        <div class="section">
            <h2>筆記總覽</h2>
            <div style="margin-bottom: 15px;">
                <input type="text" id="noteFilterInput" placeholder="輸入關鍵字..." onkeypress="if(event.key === 'Enter') addNoteFilterKeyword()">
                <button class="btn-filter" onclick="addNoteFilterKeyword()">新增過濾條件</button>
                <div class="keyword-tags" id="noteKeywordContainer"></div>
            </div>
            
            <div class="col-toggle-box">
                <span style="font-weight:bold; color:#0056b3;">👁️ 顯示欄位：</span>
                <label><input type="checkbox" checked onchange="toggleCol('noteTable', 1, this)">流水號</label>
                <label><input type="checkbox" checked onchange="toggleCol('noteTable', 2, this)">日期</label>
                <label><input type="checkbox" checked onchange="toggleCol('noteTable', 3, this)">分類</label>
                <label><input type="checkbox" checked onchange="toggleCol('noteTable', 4, this)">內容</label>
                <script>
                    for(let i=5; i<=10; i++){ document.write(`<label><input type="checkbox" checked onchange="toggleCol('noteTable', ${i}, this)">欄位 ${i}</label>`); }
                </script>
            </div>

            <div class="table-responsive">
                <table id="noteTable">
                    <thead><tr><th onclick="sortNoteTable('col1')">流水號 ↕</th><th onclick="sortNoteTable('col2')">日期 ↕</th><th onclick="sortNoteTable('col3')">分類 ↕</th><th onclick="sortNoteTable('col4')">內容 ↕</th><th onclick="sortNoteTable('col5')">欄位5 ↕</th><th onclick="sortNoteTable('col6')">欄位6 ↕</th><th onclick="sortNoteTable('col7')">欄位7 ↕</th><th onclick="sortNoteTable('col8')">欄位8 ↕</th><th onclick="sortNoteTable('col9')">欄位9 ↕</th><th onclick="sortNoteTable('col10')">欄位10 ↕</th><th>操作</th></tr></thead>
                    <tbody id="noteTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="genericPage" class="app-page" style="display: none;">
        <div class="section">
            <h2 id="genericFormTitle">新增擴充資料</h2>
            <div id="genericInputsContainer">
                <script>
                    document.write(`<div class="form-group"><label id="genLabel1">流水號 (col1)</label><input type="text" id="genCol1"></div>`);
                    document.write(`<div class="form-group"><label id="genLabel2">日期 (col2)</label><input type="date" id="genCol2"></div>`);
                    for(let i=3; i<=10; i++){
                        document.write(`<div class="form-group"><label id="genLabel${i}">欄位 ${i}</label><textarea id="genCol${i}" rows="2"></textarea></div>`);
                    }
                </script>
            </div>
            <div style="margin-top: 10px;">
                <button id="submitGenericBtn" class="btn-add" onclick="submitGenericData()">新增資料</button>
                <button id="cancelGenericBtn" class="btn-cancel" onclick="cancelGenericEdit()">取消編輯</button>
            </div>
        </div>
        
        <div class="section">
            <h2 id="genericTableTitle">資料總覽</h2>
            <div style="margin-bottom: 15px;">
                <input type="text" id="genericFilterInput" placeholder="輸入關鍵字..." onkeypress="if(event.key === 'Enter') addGenericFilterKeyword()">
                <button class="btn-filter" onclick="addGenericFilterKeyword()">新增過濾條件</button>
                <div class="keyword-tags" id="genericKeywordContainer"></div>
            </div>

            <div class="col-toggle-box">
                <span style="font-weight:bold; color:#0056b3;">👁️ 顯示欄位：</span>
                <script>
                    for(let i=1; i<=10; i++){ document.write(`<label><input type="checkbox" checked onchange="toggleCol('genericTable', ${i}, this)">欄位 ${i}</label>`); }
                </script>
            </div>

            <div class="table-responsive">
                <table id="genericTable">
                    <thead>
                        <tr id="genericTableHeader">
                            <script>
                                for(let i=1; i<=10; i++){ document.write(`<th onclick="sortGenericTable('col${i}')">欄位 ${i} ↕</th>`); }
                                document.write(`<th>操作</th>`);
                            </script>
                        </tr>
                    </thead>
                    <tbody id="genericTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🚨 這裡請記得填上您自己最新的 Google Apps Script 網址 🚨
        const API_URL = "https://script.google.com/macros/s/AKfycbworoIMCfLuYQ3UseLC0YNbzrWtT9IFmTXbEOcU1O5-U3PyUbpmt1m71jjgkB4Gp9Uk/exec";

        let currentPageName = '美食紀錄';
        let currentDescription = '';

        let filterKeywords = []; let sortCol = ''; let sortAsc = true;
        let foodDataList = []; let editingFoodId = null; 
        let sportsDataList = []; let editingSportsId = null;
        
        let noteDataList = []; let editingNoteId = null;
        let noteFilterKeywords = []; let noteSortCol = ''; let noteSortAsc = true;

        let genericDataList = []; let editingGenericId = null;
        let genericFilterKeywords = []; let genericSortCol = ''; let genericSortAsc = true;

        window.onload = function() {
            document.getElementById('sportDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('noteCol2').value = new Date().toISOString().split('T')[0];
            document.getElementById('genCol2').value = new Date().toISOString().split('T')[0];
            loadData('美食紀錄');
        };

        function toggleLoading(show) { document.getElementById('loadingMsg').style.display = show ? 'inline' : 'none'; }

        // 🌟 新增：切換表格欄位顯示/隱藏的通用函式 🌟
        function toggleCol(tableId, colIndex, checkbox) {
            const table = document.getElementById(tableId);
            if (checkbox.checked) { table.classList.remove(`hide-col-${colIndex}`); } 
            else { table.classList.add(`hide-col-${colIndex}`); }
        }

        // ================= 頁面說明區塊功能 =================
        function enableDescEdit() {
            document.getElementById('descDisplay').style.display = 'none';
            document.getElementById('descInput').style.display = 'block';
            document.getElementById('descInput').value = currentDescription;
            document.getElementById('editDescBtn').style.display = 'none';
            document.getElementById('saveDescBtn').style.display = 'inline-block';
            document.getElementById('cancelDescBtn').style.display = 'inline-block';
            document.getElementById('deleteDescBtn').style.display = 'inline-block';
        }
        function cancelDescEdit() {
            document.getElementById('descDisplay').style.display = 'block';
            document.getElementById('descInput').style.display = 'none';
            document.getElementById('editDescBtn').style.display = 'inline-block';
            document.getElementById('saveDescBtn').style.display = 'none';
            document.getElementById('cancelDescBtn').style.display = 'none';
            document.getElementById('deleteDescBtn').style.display = 'none';
        }
        async function saveDescription() {
            const newDesc = document.getElementById('descInput').value.trim();
            currentDescription = newDesc;
            document.getElementById('descDisplay').innerText = newDesc || '目前無說明，請點擊「編輯說明」來新增內容或欄位定義。';
            cancelDescEdit();
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ sheetName: currentPageName, action: 'update_desc', description: newDesc }) }); } 
            catch(e) { alert("說明更新失敗"); }
        }
        async function deleteDescription() {
            if(!confirm('確定要清除此頁面的說明嗎？')) return;
            document.getElementById('descInput').value = '';
            saveDescription();
        }

        function switchPage() {
            const selectedPageId = document.getElementById('pageSelector').value;
            document.querySelectorAll('.app-page').forEach(page => { page.style.display = 'none'; });
            cancelFoodEdit(); cancelSportsEdit(); cancelNoteEdit(); cancelGenericEdit();

            if (selectedPageId === 'foodPage') { document.getElementById('foodPage').style.display = 'block'; loadData('美食紀錄'); } 
            else if (selectedPageId === 'sportsPage') { document.getElementById('sportsPage').style.display = 'block'; loadData('運動紀錄'); } 
            else if (selectedPageId === 'notePage') { document.getElementById('notePage').style.display = 'block'; loadData('擴充預留網頁1'); } 
            else if (selectedPageId.startsWith('extPage')) {
                document.getElementById('genericPage').style.display = 'block';
                currentPageName = '擴充預留網頁' + selectedPageId.replace('extPage', '');
                document.getElementById('genericFormTitle').innerText = `新增 ${currentPageName} 資料`;
                document.getElementById('genericTableTitle').innerText = `${currentPageName} 總覽`;
                genericFilterKeywords = []; genericSortCol = ''; renderGenericKw();
                loadData(currentPageName);
            }
        }

        async function loadData(sheetName) {
            toggleLoading(true);
            try {
                const response = await fetch(`${API_URL}?sheetName=${encodeURIComponent(sheetName)}`);
                const json = await response.json();
                
                const data = json.data !== undefined ? json.data : json; 
                currentPageName = sheetName;
                currentDescription = json.description || '';
                document.getElementById('descDisplay').innerText = currentDescription || '目前無說明，請點擊「編輯說明」來新增內容或欄位定義。';
                cancelDescEdit();
                
                if (sheetName === '美食紀錄') { foodDataList = data.map(item => ({ ...item, fullText: `${item.city} ${item.district} ${item.address} ${item.storeName} ${item.category} ${item.other}`.toLowerCase() })); renderFoodTable(); } 
                else if (sheetName === '運動紀錄') { sportsDataList = data; renderSportsTable(); } 
                else if (sheetName === '擴充預留網頁1') { noteDataList = data.map(item => ({ ...item, fullText: `${item.col1} ${item.col2} ${item.col3} ${item.col4} ${item.col5} ${item.col6} ${item.col7} ${item.col8} ${item.col9} ${item.col10}`.toLowerCase() })); renderNoteTable(); } 
                else if (sheetName.startsWith('擴充預留網頁')) { genericDataList = data.map(item => ({ ...item, fullText: `${item.col1} ${item.col2} ${item.col3} ${item.col4} ${item.col5} ${item.col6} ${item.col7} ${item.col8} ${item.col9} ${item.col10}`.toLowerCase() })); renderGenericTable(); }
            } catch (error) { console.error(`載入 ${sheetName} 失敗:`, error); } 
            finally { toggleLoading(false); }
        }

        // ================= 擴充通用網頁 (2~10) =================
        async function submitGenericData() {
            const payload = { sheetName: currentPageName, id: editingGenericId || Date.now(), action: editingGenericId ? 'edit' : 'add' };
            for(let i=1; i<=10; i++) { payload[`col${i}`] = document.getElementById(`genCol${i}`).value; } 
            const fullText = Object.values(payload).join(' ').toLowerCase();
            if (editingGenericId) { const idx = genericDataList.findIndex(d => String(d.id) === String(editingGenericId)); if (idx > -1) genericDataList[idx] = { ...payload, fullText };
            } else { genericDataList.push({ ...payload, fullText }); }
