<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資料管理系統</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f9f9f9; color: #333; }
        h2 { border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-top: 0; }
        .section { background-color: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { display: inline-block; margin-right: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="date"], select { padding: 8px; width: 150px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: #fff; font-weight: bold; margin-right: 5px; }
        
        .btn-add { background-color: #28a745; } .btn-add:hover { background-color: #218838; }
        .btn-map { background-color: #4285F4; } .btn-map:hover { background-color: #357AE8; }
        .btn-filter { background-color: #17a2b8; } .btn-filter:hover { background-color: #138496; }
        
        .btn-edit { background-color: #ffc107; color: #333; padding: 5px 10px; font-size: 13px;} 
        .btn-edit:hover { background-color: #e0a800; }
        .btn-delete { background-color: #dc3545; padding: 5px 10px; font-size: 13px;} 
        .btn-delete:hover { background-color: #c82333; }
        .btn-cancel { background-color: #6c757d; display: none; } 
        .btn-cancel:hover { background-color: #5a6268; }

        .keyword-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background-color: #e2e3e5; padding: 5px 10px; border-radius: 15px; font-size: 13px; display: flex; align-items: center; }
        .tag span { margin-left: 8px; cursor: pointer; color: #dc3545; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; cursor: pointer; position: relative; }
        th:hover { background-color: #e9e9e9; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f1f1f1; }
        a.map-link { color: #4285F4; text-decoration: none; font-weight: bold; }
        a.map-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px; padding: 15px; background-color: #e9ecef; border-radius: 8px; display: flex; align-items: center;">
        <label for="pageSelector" style="font-size: 16px; margin-right: 10px; margin-bottom: 0;">切換系統頁面：</label>
        <select id="pageSelector" onchange="switchPage()" style="padding: 8px; font-size: 16px; width: 200px;">
            <option value="foodPage">🍔 美食店家地圖</option>
            <option value="sportsPage">🏃‍♂️ 運動訓練紀錄</option>
        </select>
        <span id="loadingMsg" style="margin-left: 15px; color: #007bff; font-weight: bold; display: none;">資料載入與同步中...</span>
    </div>

    <div id="foodPage" class="app-page">
        <div class="section">
            <h2 id="foodFormTitle">新增美食店家</h2>
            <div class="form-group"><label>縣市</label><input type="text" id="city" placeholder="例如：新北市"></div>
            <div class="form-group"><label>區域</label><input type="text" id="district" placeholder="例如：板橋區"></div>
            <div class="form-group"><label>地址</label><input type="text" id="address" placeholder="例如：中山路一段1號" style="width: 250px;"></div>
            <div class="form-group"><label>店名</label><input type="text" id="storeName" placeholder="例如：美味小吃"></div>
            <div class="form-group"><label>分類</label><input type="text" id="category" placeholder="例如：餐廳"></div>
            <div class="form-group"><label>其他</label><input type="text" id="other" placeholder="備註..."></div>
            <div style="margin-top: 10px;">
                <button id="submitFoodBtn" class="btn-add" onclick="submitFoodData()">新增資料</button>
                <button id="cancelFoodBtn" class="btn-cancel" onclick="cancelFoodEdit()">取消編輯</button>
                <button class="btn-map" onclick="testGoogleMap()">測試 Google Map</button>
            </div>
        </div>

        <div class="section">
            <h2>美食清單與過濾</h2>
            <div>
                <input type="text" id="filterInput" placeholder="輸入關鍵字..." onkeypress="handleFilterKeyPress(event)">
                <button class="btn-filter" onclick="addFilterKeyword()">新增過濾條件</button>
                <div class="keyword-tags" id="keywordContainer"></div>
            </div>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('city')">縣市</th><th onclick="sortTable('district')">區域</th>
                        <th onclick="sortTable('address')">地址</th><th onclick="sortTable('storeName')">店名</th>
                        <th onclick="sortTable('category')">分類</th><th onclick="sortTable('other')">其他</th>
                        <th>地圖</th><th>操作</th> 
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="sportsPage" class="app-page" style="display: none;">
        <div class="section">
            <h2 id="sportsFormTitle">新增運動紀錄</h2>
            <div class="form-group"><label>日期</label><input type="date" id="sportDate"></div>
            <div class="form-group">
                <label>運動類型</label>
                <select id="sportType">
                    <option value="跑步">跑步</option>
                    <option value="排球">排球</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group"><label>距離 (km)</label><input type="text" id="sportDistance" placeholder="例如：10.5"></div>
            <div class="form-group"><label>備註 / 心得</label><input type="text" id="sportNotes" placeholder="例如：半馬訓練..." style="width: 250px;"></div>
            <div style="margin-top: 10px;">
                <button id="submitSportsBtn" class="btn-add" onclick="submitSportsData()">新增紀錄</button>
                <button id="cancelSportsBtn" class="btn-cancel" onclick="cancelSportsEdit()">取消編輯</button>
            </div>
        </div>
        
        <div class="section">
            <h2>訓練紀錄總覽</h2>
            <table id="sportsTable">
                <thead>
                    <tr>
                        <th>日期</th><th>運動類型</th><th>距離 (km)</th><th>備註</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="sportsTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let filterKeywords = [];
        let sortCol = '';
        let sortAsc = true;
        let foodDataList = []; 
        let sportsDataList = []; 
        let editingFoodId = null; 
        let editingSportsId = null;

        // 💡 您的專屬 API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbworoIMCfLuYQ3UseLC0YNbzrWtT9IFmTXbEOcU1O5-U3PyUbpmt1m71jjgkB4Gp9Uk/exec";

        window.onload = function() {
            document.getElementById('sportDate').value = new Date().toISOString().split('T')[0];
            loadData('美食紀錄');
        };

        function toggleLoading(show) {
            document.getElementById('loadingMsg').style.display = show ? 'inline' : 'none';
        }

        function switchPage() {
            const selectedPageId = document.getElementById('pageSelector').value;
            document.querySelectorAll('.app-page').forEach(page => {
                page.style.display = (page.id === selectedPageId) ? 'block' : 'none';
            });
            cancelFoodEdit();
            cancelSportsEdit();
            loadData(selectedPageId === 'foodPage' ? '美食紀錄' : '運動紀錄');
        }

        async function loadData(sheetName) {
            toggleLoading(true);
            try {
                const response = await fetch(`${API_URL}?sheetName=${encodeURIComponent(sheetName)}`);
                const data = await response.json();
                
                if (sheetName === '美食紀錄') {
                    foodDataList = data.map(item => ({
                        ...item,
                        fullText: `${item.city} ${item.district} ${item.address} ${item.storeName} ${item.category} ${item.other}`.toLowerCase()
                    }));
                    renderFoodTable();
                } else if (sheetName === '運動紀錄') {
                    sportsDataList = data;
                    renderSportsTable();
                }
            } catch (error) {
                console.error(`載入 ${sheetName} 失敗:`, error);
            } finally {
                toggleLoading(false);
            }
        }

        // ================= 美食功能 =================
        async function submitFoodData() {
            const city = document.getElementById('city').value.trim();
            const district = document.getElementById('district').value.trim();
            const address = document.getElementById('address').value.trim();
            const storeName = document.getElementById('storeName').value.trim();
            const category = document.getElementById('category').value.trim();
            const other = document.getElementById('other').value.trim();

            if (!storeName) { alert('店名為必填！'); return; }

            const payload = {
                sheetName: '美食紀錄', id: editingFoodId ? editingFoodId : Date.now(), 
                action: editingFoodId ? 'edit' : 'add', city, district, address, storeName, category, other
            };

            const fullText = `${city} ${district} ${address} ${storeName} ${category} ${other}`.toLowerCase();
            if (editingFoodId) {
                const idx = foodDataList.findIndex(d => String(d.id) === String(editingFoodId));
                if (idx > -1) foodDataList[idx] = { ...payload, fullText };
            } else { foodDataList.push({ ...payload, fullText }); }
            
            renderFoodTable(); cancelFoodEdit(); 
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); } 
            catch (e) { alert("雲端更新失敗！"); }
        }

        function editFoodData(id) {
            const item = foodDataList.find(d => String(d.id) === String(id));
            if (!item) return;
            document.getElementById('city').value = item.city || '';
            document.getElementById('district').value = item.district || '';
            document.getElementById('address').value = item.address || '';
            document.getElementById('storeName').value = item.storeName || '';
            document.getElementById('category').value = item.category || '';
            document.getElementById('other').value = item.other || '';
            
            editingFoodId = id;
            document.getElementById('foodFormTitle').innerText = '編輯美食資料';
            document.getElementById('submitFoodBtn').innerText = '儲存修改';
            document.getElementById('submitFoodBtn').className = 'btn-edit';
            document.getElementById('cancelFoodBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function cancelFoodEdit() {
            editingFoodId = null;
            document.querySelectorAll('#foodPage .form-group input').forEach(input => input.value = '');
            document.getElementById('foodFormTitle').innerText = '新增美食店家';
            document.getElementById('submitFoodBtn').innerText = '新增資料';
            document.getElementById('submitFoodBtn').className = 'btn-add';
            document.getElementById('cancelFoodBtn').style.display = 'none';
        }

        async function deleteFoodData(id) {
            if (!confirm('確定刪除此美食紀錄？')) return;
            foodDataList = foodDataList.filter(d => String(d.id) !== String(id));
            renderFoodTable();
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ id: id, action: 'delete', sheetName: '美食紀錄' }) }); } 
            catch (e) { alert("刪除失敗！"); }
        }

        function renderFoodTable() {
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
            foodDataList.forEach(data => {
                if (filterKeywords.length > 0 && !filterKeywords.some(kw => data.fullText.includes(kw))) return;
                const tr = document.createElement('tr');
                const query = `${data.city||''} ${data.address||''} ${data.storeName||''}`.trim();
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
                tr.innerHTML = `
                    <td>${data.city || ''}</td><td>${data.district || ''}</td><td>${data.address || ''}</td>
                    <td>${data.storeName || ''}</td><td>${data.category || ''}</td><td>${data.other || ''}</td>
                    <td><a href="${mapUrl}" target="_blank" class="map-link">搜尋</a></td>
                    <td><button class="btn-edit" onclick="editFoodData('${data.id}')">編輯</button>
                        <button class="btn-delete" onclick="deleteFoodData('${data.id}')">刪除</button></td>`;
                tbody.appendChild(tr);
            });
        }

        // ================= 運動功能 =================
        async function submitSportsData() {
            const date = document.getElementById('sportDate').value;
            const type = document.getElementById('sportType').value;
            const distance = document.getElementById('sportDistance').value.trim();
            const notes = document.getElementById('sportNotes').value.trim();
            
            if (!date) { alert('請選擇日期！'); return; }

            const payload = {
                sheetName: '運動紀錄', id: editingSportsId ? editingSportsId : Date.now(),
                action: editingSportsId ? 'edit' : 'add',
                date, type, distance: distance || '-', notes: notes || '-'
            };

            if (editingSportsId) {
                const idx = sportsDataList.findIndex(d => String(d.id) === String(editingSportsId));
                if (idx > -1) sportsDataList[idx] = payload;
            } else { sportsDataList.push(payload); }
            
            renderSportsTable(); cancelSportsEdit();

            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); } 
            catch (e) { alert("雲端更新失敗！"); }
        }

        function editSportsData(id) {
            const item = sportsDataList.find(d => String(d.id) === String(id));
            if (!item) return;
            
            let displayDate = item.date || '';
            if(displayDate && displayDate.includes('T')) displayDate = displayDate.split('T')[0];
            
            document.getElementById('sportDate').value = displayDate;
            document.getElementById('sportType').value = item.type || '跑步';
            document.getElementById('sportDistance').value = item.distance === '-' ? '' : item.distance;
            document.getElementById('sportNotes').value = item.notes === '-' ? '' : item.notes;
            
            editingSportsId = id;
            document.getElementById('sportsFormTitle').innerText = '編輯運動紀錄';
            document.getElementById('submitSportsBtn').innerText = '儲存修改';
            document.getElementById('submitSportsBtn').className = 'btn-edit';
            document.getElementById('cancelSportsBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function cancelSportsEdit() {
            editingSportsId = null;
            document.getElementById('sportDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('sportType').value = '跑步';
            document.getElementById('sportDistance').value = '';
            document.getElementById('sportNotes').value = '';
            
            document.getElementById('sportsFormTitle').innerText = '新增運動紀錄';
            document.getElementById('submitSportsBtn').innerText = '新增紀錄';
            document.getElementById('submitSportsBtn').className = 'btn-add';
            document.getElementById('cancelSportsBtn').style.display = 'none';
        }

        async function deleteSportsData(id) {
            if (!confirm('確定刪除此運動紀錄？')) return;
            sportsDataList = sportsDataList.filter(d => String(d.id) !== String(id));
            renderSportsTable();
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ id: id, action: 'delete', sheetName: '運動紀錄' }) }); } 
            catch (e) { alert("刪除失敗！"); }
        }

        function renderSportsTable() {
            const tbody = document.getElementById('sportsTableBody');
            tbody.innerHTML = '';
            const sortedList = [...sportsDataList].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedList.forEach(data => {
                let displayDate = data.date;
                if(displayDate && displayDate.includes('T')) displayDate = displayDate.split('T')[0];

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${displayDate || ''}</td><td>${data.type || ''}</td>
                    <td>${data.distance || ''}</td><td>${data.notes || ''}</td>
                    <td><button class="btn-edit" onclick="editSportsData('${data.id}')">編輯</button>
                        <button class="btn-delete" onclick="deleteSportsData('${data.id}')">刪除</button></td>`;
                tbody.appendChild(tr);
            });
        }

        // ================= 附屬功能區 =================
        function testGoogleMap() {
            const c = document.getElementById('city').value, a = document.getElementById('address').value, s = document.getElementById('storeName').value;
            if (!c && !a && !s) { alert('請填寫資訊'); return; }
            const query = `${c||''} ${a||''} ${s||''}`.trim();
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`, '_blank');
        }
        function addFilterKeyword() {
            const kw = document.getElementById('filterInput').value.trim().toLowerCase();
            if (kw && !filterKeywords.includes(kw)) { filterKeywords.push(kw); renderKw(); renderFoodTable(); }
            document.getElementById('filterInput').value = '';
        }
        function handleFilterKeyPress(e) { if (e.key === 'Enter') addFilterKeyword(); }
        function removeKeyword(kw) { filterKeywords = filterKeywords.filter(k => k !== kw); renderKw(); renderFoodTable(); }
        function renderKw() {
            const c = document.getElementById('keywordContainer'); c.innerHTML = '';
            filterKeywords.forEach(kw => { c.innerHTML += `<div class="tag">${kw} <span onclick="removeKeyword('${kw}')">✖</span></div>`; });
        }
        function sortTable(col) {
            if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
            foodDataList.sort((a, b) => {
                if ((a[col]||'') < (b[col]||'')) return sortAsc ? -1 : 1;
                if ((a[col]||'') > (b[col]||'')) return sortAsc ? 1 : -1;
                return 0;
            });
            renderFoodTable();
        }
    </script>
</body>
</html>
